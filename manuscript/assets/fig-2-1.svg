<circle cx="210" cy="105" r="10" fill="#3a6ea5" stroke="none" stroke-width="1"/>
<circle cx="280" cy="105" r="10" fill="#3a6ea5" stroke="none" stroke-width="1"/>
<circle cx="350" cy="105" r="10" fill="#3a6ea5" stroke="none" stroke-width="1"/>
<circle cx="420" cy="105" r="10" fill="#3a6ea5" stroke="none" stroke-width="1"/>
<circle cx="490" cy="105" r="10" fill="#3a6ea5" stroke="none" stroke-width="1"/>
<circle cx="560" cy="105" r="10" fill="#3a6ea5" stroke="none" stroke-width="1"/>
<circle cx="630" cy="105" r="10" fill="#3a6ea5" stroke="none" stroke-width="1"/>
<text x="420" y="81" text-anchor="middle" font-size="13" font-weight="bold" fill="#3a6ea5">読む</text>
<text x="420" y="135" text-anchor="middle" font-size="12" font-weight="normal" fill="#52606d">何度も、ずっと</text>
