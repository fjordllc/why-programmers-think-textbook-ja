<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 190" font-family="sans-serif" role="img" aria-label="コードの一生で、書く回数は一度、読む回数は何度も続くことを示す帯">
<defs><marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#3a6ea5"/></marker><marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b23a48"/></marker><marker id="arg" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#52606d"/></marker></defs>
<text x="60" y="46" text-anchor="start" font-size="14" font-weight="bold" fill="#52606d">コードの一生</text>
<line x1="70" y1="105" x2="660" y2="105" stroke="#cdd5df" stroke-width="2"/>
<circle cx="95" cy="105" r="13" fill="#b23a48" stroke="none" stroke-width="1"/>
<text x="95" y="81" text-anchor="middle" font-size="13" font-weight="bold" fill="#b23a48">書く</text>
