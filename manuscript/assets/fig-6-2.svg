<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 230" font-family="sans-serif" role="img" aria-label="中身を閉じると直す力は作った会社に、中を開くと使う人にあることの対比">
<defs><marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#3a6ea5"/></marker><marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b23a48"/></marker><marker id="arg" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#52606d"/></marker></defs>
<rect x="50" y="64" width="300" height="140" rx="10" fill="#eef1f5" stroke="#b8c2cc" stroke-width="1.2"/>
<text x="200" y="100" text-anchor="middle" font-size="17" font-weight="bold" fill="#1f2933">中を閉じて売る</text>
<text x="200" y="144" text-anchor="middle" font-size="13" font-weight="normal" fill="#52606d">直す力</text>
<text x="200" y="174" text-anchor="middle" font-size="16" font-weight="bold" fill="#b23a48">＝ 作った会社</text>
<rect x="370" y="64" width="300" height="140" rx="10" fill="#dce9f2" stroke="#3a6ea5" stroke-width="1.2"/>
<text x="520" y="100" text-anchor="middle" font-size="17" font-weight="bold" fill="#3a6ea5">中を開く</text>
<text x="520" y="144" text-anchor="middle" font-size="13" font-weight="normal" fill="#52606d">直す力</text>
<text x="520" y="174" text-anchor="middle" font-size="16" font-weight="bold" fill="#3a6ea5">＝ 使う人</text>
</svg>