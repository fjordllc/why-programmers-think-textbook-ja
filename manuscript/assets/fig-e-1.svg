<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 230" font-family="sans-serif" role="img" aria-label="閉じた問いはAIが再現でき、開いた問いを引き受ける担い手は未決であることを示す図">
<defs><marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#3a6ea5"/></marker><marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b23a48"/></marker><marker id="arg" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#52606d"/></marker></defs>
<rect x="40" y="60" width="300" height="120" rx="10" fill="#eef1f5" stroke="#b8c2cc" stroke-width="1.2"/>
<text x="190" y="108" text-anchor="middle" font-size="18" font-weight="bold" fill="#1f2933">閉じた問い</text>
<text x="190" y="146" text-anchor="middle" font-size="17" font-weight="bold" fill="#3a6ea5">→ AI が再現できる</text>
<rect x="380" y="60" width="300" height="120" rx="10" fill="#dce9f2" stroke="#3a6ea5" stroke-width="1.2"/>
<text x="530" y="108" text-anchor="middle" font-size="18" font-weight="bold" fill="#3a6ea5">開いた問い</text>
<text x="530" y="146" text-anchor="middle" font-size="16" font-weight="bold" fill="#b23a48">→ 引き受けるのは、誰か？</text>
</svg>