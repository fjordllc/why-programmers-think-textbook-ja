<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" font-family="sans-serif" role="img" aria-label="機械ごとに作り直し配布権も他人が握る世界と、URL 一つで全機械に届く世界の対比">
<defs><marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#3a6ea5"/></marker><marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b23a48"/></marker><marker id="arg" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#52606d"/></marker></defs>
<rect x="40" y="66" width="300" height="150" rx="10" fill="#eef1f5" stroke="#b8c2cc" stroke-width="1.2"/>
<text x="190" y="102" text-anchor="middle" font-size="17" font-weight="bold" fill="#1f2933">作り直して配る</text>
<text x="190" y="142" text-anchor="middle" font-size="14" font-weight="normal" fill="#52606d">OS ごとに作り直し</text>
<text x="190" y="174" text-anchor="middle" font-size="14" font-weight="normal" fill="#b23a48">配る鍵は、他人が握る</text>
<rect x="380" y="66" width="300" height="150" rx="10" fill="#dce9f2" stroke="#3a6ea5" stroke-width="1.2"/>
<text x="530" y="102" text-anchor="middle" font-size="17" font-weight="bold" fill="#3a6ea5">URL 一つで届く</text>
<text x="530" y="142" text-anchor="middle" font-size="14" font-weight="normal" fill="#1f2933">どの機械にも、そのまま</text>
<text x="530" y="174" text-anchor="middle" font-size="14" font-weight="bold" fill="#3a6ea5">許可は、いらない</text>
</svg>