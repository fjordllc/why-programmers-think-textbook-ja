<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 330" font-family="sans-serif" role="img" aria-label="外側の偶有的な複雑さは道具で減らせるが、中心の本質的な複雑さは消えない図">
<defs><marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#3a6ea5"/></marker><marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b23a48"/></marker><marker id="arg" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#52606d"/></marker></defs>
<rect x="50" y="60" width="460" height="240" rx="16" fill="#eef1f5" stroke="#b8c2cc" stroke-width="1.2"/>
<text x="280" y="94" text-anchor="middle" font-size="16" font-weight="bold" fill="#52606d">偶有的な複雑さ</text>
<text x="280" y="118" text-anchor="middle" font-size="13" font-weight="normal" fill="#52606d">＝ 道具で減らせる</text>
<rect x="180" y="155" width="200" height="120" rx="14" fill="#dce9f2" stroke="#3a6ea5" stroke-width="1.2"/>
<text x="280" y="212" text-anchor="middle" font-size="16" font-weight="bold" fill="#3a6ea5">本質的な複雑さ</text>
<text x="280" y="240" text-anchor="middle" font-size="14" font-weight="normal" fill="#1f2933">＝ 消えない</text>
</svg>