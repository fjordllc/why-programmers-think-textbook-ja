<circle cx="430" cy="105" r="15" fill="#eef1f5" stroke="#b8c2cc" stroke-width="1"/>
<line x1="445" y1="105" x2="520" y2="175" stroke="#c7ccd3" stroke-width="1.6" stroke-dasharray="4 4"/>
<circle cx="430" cy="170" r="15" fill="#eef1f5" stroke="#b8c2cc" stroke-width="1"/>
<line x1="445" y1="170" x2="520" y2="175" stroke="#c7ccd3" stroke-width="1.6" stroke-dasharray="4 4"/>
<circle cx="430" cy="235" r="15" fill="#eef1f5" stroke="#b8c2cc" stroke-width="1"/>
<line x1="445" y1="235" x2="520" y2="175" stroke="#c7ccd3" stroke-width="1.6" stroke-dasharray="4 4"/>
<text x="545" y="270" text-anchor="middle" font-size="13" font-weight="bold" fill="#b23a48">触れないコードの山</text>
