<line x1="285" y1="170" x2="214" y2="175" stroke="#52606d" stroke-width="1.6" marker-end="url(#arg)"/>
<circle cx="300" cy="235" r="15" fill="#eef1f5" stroke="#b8c2cc" stroke-width="1"/>
<line x1="285" y1="235" x2="214" y2="175" stroke="#52606d" stroke-width="1.6" marker-end="url(#arg)"/>
