<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 230" font-family="sans-serif" role="img" aria-label="変更のたびに検査が走り、通れば手を入れられ、壊せばその場で気づく安全網">
<defs><marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#3a6ea5"/></marker><marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b23a48"/></marker><marker id="arg" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#52606d"/></marker></defs>
<rect x="40" y="90" width="150" height="60" rx="10" fill="#eef1f5" stroke="#b8c2cc" stroke-width="1.2"/>
<text x="115" y="126" text-anchor="middle" font-size="17" font-weight="bold" fill="#1f2933">変更</text>
<line x1="190" y1="120" x2="248" y2="120" stroke="#3a6ea5" stroke-width="2" marker-end="url(#ar)"/>
<rect x="250" y="90" width="150" height="60" rx="10" fill="#dce9f2" stroke="#3a6ea5" stroke-width="1.2"/>
<text x="325" y="126" text-anchor="middle" font-size="17" font-weight="bold" fill="#3a6ea5">検査</text>
<line x1="400" y1="120" x2="486" y2="84" stroke="#52606d" stroke-width="1.6" marker-end="url(#arg)"/>
<line x1="400" y1="120" x2="486" y2="158" stroke="#52606d" stroke-width="1.6" marker-end="url(#arg)"/>
<text x="430" y="88" text-anchor="middle" font-size="12" font-weight="normal" fill="#52606d">通る</text>
<text x="430" y="170" text-anchor="middle" font-size="12" font-weight="normal" fill="#52606d">壊れる</text>
<rect x="490" y="58" width="210" height="52" rx="10" fill="#dce9f2" stroke="#3a6ea5" stroke-width="1.2"/>
<text x="595" y="90" text-anchor="middle" font-size="15" font-weight="bold" fill="#3a6ea5">手を入れられる</text>
<rect x="490" y="132" width="210" height="52" rx="10" fill="#f6e7e9" stroke="#c9727f" stroke-width="1.2"/>
<text x="595" y="164" text-anchor="middle" font-size="15" font-weight="bold" fill="#b23a48">その場で気づく</text>
</svg>