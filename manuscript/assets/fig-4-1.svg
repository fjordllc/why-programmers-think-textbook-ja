<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="sans-serif" role="img" aria-label="同じ警告でも、1202は一度きりの本番、FAILは何度でもわざと鳴らす日常という対比">
<defs><marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#3a6ea5"/></marker><marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b23a48"/></marker><marker id="arg" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#52606d"/></marker></defs>
<text x="380.0" y="42" text-anchor="middle" font-size="16" font-weight="bold" fill="#52606d">どちらも「ここが危ない」の合図</text>
<rect x="40" y="70" width="330" height="192" rx="10" fill="#eef1f5" stroke="#b8c2cc" stroke-width="1.2"/>
<text x="205" y="128" text-anchor="middle" font-size="34" font-weight="bold" fill="#b23a48" font-family="ui-monospace,monospace">1202</text>
<text x="205" y="176" text-anchor="middle" font-size="17" font-weight="normal" fill="#1f2933">月の降下、一度きり</text>
<rect x="150" y="216" width="110" height="30" rx="15" fill="#fff" stroke="#b8c2cc" stroke-width="1.2"/>
<text x="205" y="236" text-anchor="middle" font-size="14" font-weight="bold" fill="#b23a48">本番</text>
<rect x="390" y="70" width="330" height="192" rx="10" fill="#dce9f2" stroke="#3a6ea5" stroke-width="1.2"/>
<text x="555" y="128" text-anchor="middle" font-size="34" font-weight="bold" fill="#3a6ea5" font-family="ui-monospace,monospace">FAIL</text>
<text x="555" y="176" text-anchor="middle" font-size="17" font-weight="normal" fill="#1f2933">毎日、わざと鳴らす</text>
<rect x="500" y="216" width="110" height="30" rx="15" fill="#fff" stroke="#3a6ea5" stroke-width="1.2"/>
<text x="555" y="236" text-anchor="middle" font-size="14" font-weight="bold" fill="#3a6ea5">日常</text>
</svg>