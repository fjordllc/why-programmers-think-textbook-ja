<rect x="70" y="70" width="150" height="72" rx="10" fill="#eef1f5" stroke="#b8c2cc" stroke-width="1.2"/>
<text x="145" y="104" text-anchor="middle" font-size="17" font-weight="bold" fill="#1f2933">道具 A</text>
<text x="145" y="128" text-anchor="middle" font-size="12" font-weight="normal" fill="#52606d">一つの仕事</text>
<rect x="290" y="70" width="150" height="72" rx="10" fill="#eef1f5" stroke="#b8c2cc" stroke-width="1.2"/>
<text x="365" y="104" text-anchor="middle" font-size="17" font-weight="bold" fill="#1f2933">道具 B</text>
<text x="365" y="128" text-anchor="middle" font-size="12" font-weight="normal" fill="#52606d">一つの仕事</text>
<rect x="510" y="70" width="150" height="72" rx="10" fill="#eef1f5" stroke="#b8c2cc" stroke-width="1.2"/>
<text x="585" y="104" text-anchor="middle" font-size="17" font-weight="bold" fill="#1f2933">道具 C</text>
<text x="585" y="128" text-anchor="middle" font-size="12" font-weight="normal" fill="#52606d">一つの仕事</text>
<text x="255" y="118" text-anchor="middle" font-size="36" font-weight="bold" fill="#3a6ea5">│</text>
<text x="475" y="118" text-anchor="middle" font-size="36" font-weight="bold" fill="#3a6ea5">│</text>
<text x="360.0" y="182" text-anchor="middle" font-size="14" font-weight="normal" fill="#52606d">つなぐと、大きな仕事になる</text>
