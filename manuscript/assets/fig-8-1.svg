<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="sans-serif" role="img" aria-label="言語が簡単にする範囲が思考の範囲になり、難しいことは思いつかなくなる檻の図">
<defs><marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#3a6ea5"/></marker><marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b23a48"/></marker><marker id="arg" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#52606d"/></marker></defs>
<rect x="20" y="20" width="680" height="300" rx="8" fill="#f0f2f5" stroke="#e2e6eb" stroke-width="1.2"/>
<text x="360.0" y="58" text-anchor="middle" font-size="15" font-weight="bold" fill="#52606d">言語の外 ＝ 難しいこと → 思いつかない</text>
<rect x="160" y="100" width="400" height="170" rx="16" fill="#dce9f2" stroke="#3a6ea5" stroke-width="1.2" stroke-dasharray="7 5"/>
<text x="360" y="168" text-anchor="middle" font-size="22" font-weight="bold" fill="#3a6ea5">簡単にすること</text>
<text x="360" y="206" text-anchor="middle" font-size="16" font-weight="normal" fill="#1f2933">＝ 考えられる範囲</text>
<text x="360" y="246" text-anchor="middle" font-size="12" font-weight="normal" fill="#52606d">― 檻の中が、考えの範囲 ―</text>
</svg>